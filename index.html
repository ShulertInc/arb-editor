<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ARB Locale Editor</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
        <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

        <main class="app-shell">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Flutter gen-l10n</p>
                    <h1>ARB Locale Editor</h1>
                </div>
                <div class="topbar-actions">
                    <label class="btn btn-secondary" for="importFiles"
                        >Import ARB Files</label
                    >
                    <input
                        id="importFiles"
                        type="file"
                        accept=".arb,application/json"
                        multiple
                        hidden
                    />
                    <button
                        id="newLocaleBtn"
                        class="btn btn-secondary"
                        type="button"
                    >
                        Add Locale
                    </button>
                    <button id="newMessageBtn" class="btn" type="button">
                        Add Message
                    </button>
                </div>
            </header>

            <section class="statusbar" id="status">
                Connecting to server...
            </section>

            <section class="workspace">
                <aside class="panel panel-left">
                    <div class="panel-title-row">
                        <h2>Messages</h2>
                        <input
                            id="messageSearch"
                            class="input"
                            type="text"
                            placeholder="Filter keys"
                        />
                    </div>
                    <ul id="messageList" class="message-list"></ul>
                </aside>

                <section class="panel panel-main">
                    <div id="emptyState" class="empty-state">
                        <h3>No message selected</h3>
                        <p>Select a key from the list, or add a new message.</p>
                    </div>

                    <form id="editorForm" class="editor hidden">
                        <div class="grid two">
                            <label>
                                Message Key
                                <input
                                    id="messageKey"
                                    class="input"
                                    type="text"
                                    required
                                />
                            </label>
                            <label>
                                Description (@key.description)
                                <input
                                    id="messageDescription"
                                    class="input"
                                    type="text"
                                    placeholder="Context for translators"
                                />
                            </label>
                        </div>

                        <label>
                            Placeholders JSON (@key.placeholders)
                            <textarea
                                id="placeholdersJson"
                                class="input code"
                                rows="5"
                                placeholder='{"userName": {"type": "String", "example": "Bob"}}'
                            ></textarea>
                        </label>

                        <div
                            id="translationsGrid"
                            class="translations-grid"
                        ></div>

                        <div class="editor-actions">
                            <button class="btn" type="submit">
                                Save Message
                            </button>
                            <button
                                id="deleteMessageBtn"
                                class="btn btn-danger"
                                type="button"
                            >
                                Delete Message
                            </button>
                        </div>
                    </form>
                </section>

                <aside class="panel panel-right">
                    <h2>Checks</h2>
                    <ul id="issuesList" class="issues-list"></ul>
                    <div class="export-actions">
                        <button id="exportCurrentBtn" class="btn" type="button">
                            Export Current Locale
                        </button>
                        <button
                            id="exportAllBtn"
                            class="btn btn-secondary"
                            type="button"
                        >
                            Export All Locales
                        </button>
                    </div>
                    <p class="hint">
                        Files are saved as
                        <span class="mono">app_{locale}.arb</span> using pretty
                        JSON.
                    </p>
                </aside>
            </section>
        </main>

        <template id="translationFieldTemplate">
            <label class="translation-field">
                <span class="translation-label"></span>
                <textarea class="input" rows="3"></textarea>
            </label>
        </template>

        <script src="app.js" defer></script>
    </body>
</html>
